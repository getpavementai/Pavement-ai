<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pavement AI — Asphalt & Concrete Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0e0e0e;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.bg{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 20% 50%,rgba(251,176,59,.07) 0%,transparent 50%),radial-gradient(ellipse 40% 40% at 80% 20%,rgba(251,176,59,.04) 0%,transparent 50%)}
.card{width:100%;max-width:680px;background:#161616;border:1px solid #2a2a2a;border-radius:16px;overflow:hidden;display:flex;flex-direction:column;min-height:min(700px,90vh);max-height:90vh;box-shadow:0 24px 80px rgba(0,0,0,.7)}

/* Header */
.header{padding:18px 22px;background:#111;border-bottom:1px solid #222;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:12px}
.logo{width:42px;height:42px;background:linear-gradient(135deg,#fb9c0f,#e67e00);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 14px rgba(251,156,15,.3)}
.brand{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:3px;color:#f5f5f5;line-height:1.1}
.tagline{font-size:11px;color:#555;margin-top:2px}
.status{display:flex;align-items:center;gap:6px;font-size:10px;letter-spacing:1.5px;color:#4ade80;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);border-radius:20px;padding:4px 10px}
.status-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80}

/* Chat */
.chat{flex:1;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:14px}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}

.msg-row{display:flex;align-items:flex-end;gap:8px}
.msg-row.user{justify-content:flex-end}
.avatar{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#fb9c0f,#e67e00);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.bubble{padding:11px 14px;font-size:14px;line-height:1.65;max-width:85%;white-space:pre-wrap}
.bubble.ai{background:#1e1e1e;border:1px solid #2c2c2c;border-radius:14px 14px 14px 3px;color:#e0e0e0}
.bubble.user{background:linear-gradient(135deg,#fb9c0f,#e06800);border-radius:14px 14px 3px 14px;color:#fff;font-weight:500;max-width:80%}

/* Suggestions */
.suggestions{margin-top:6px}
.suggest-label{font-size:10px;letter-spacing:2px;color:#3a3a3a;margin-bottom:8px}
.suggest-grid{display:flex;flex-wrap:wrap;gap:7px}
.suggest-btn{background:transparent;border:1px solid #2a2a2a;border-radius:20px;padding:6px 13px;color:#666;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.suggest-btn:hover{border-color:#fb9c0f;color:#fb9c0f}

/* Typing dots */
.dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:#fb9c0f;margin:0 2px;animation:blink 1.4s infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* Input */
.input-area{padding:14px 18px;border-top:1px solid #222;display:flex;gap:10px;align-items:flex-end;background:#111;flex-shrink:0}
textarea{flex:1;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:12px;padding:11px 15px;color:#e0e0e0;font-size:14px;font-family:'DM Sans',sans-serif;resize:none;line-height:1.5;max-height:100px;outline:none;transition:border .2s}
textarea:focus{border-color:#fb9c0f}
.send-btn{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,#fb9c0f,#e06800);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 12px rgba(251,156,15,.3);transition:opacity .2s}
.send-btn:disabled{opacity:.35;cursor:not-allowed}

.footer{text-align:center;font-size:11px;color:#2a2a2a;padding:8px;background:#111;border-top:1px solid #1a1a1a;flex-shrink:0}
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">

  <div class="header">
    <div class="header-left">
      <div class="logo">⬡</div>
      <div>
        <div class="brand">PAVEMENT AI</div>
        <div class="tagline">Expert Asphalt & Concrete Assistant</div>
      </div>
    </div>
    <div class="status"><span class="status-dot"></span>ONLINE 24/7</div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <textarea id="input" placeholder="Ask about asphalt, concrete, pricing, repairs..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" disabled onclick="sendMessage()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="footer">Powered by Pavement AI · Pricing estimates require on-site assessment</div>
</div>

<script>
const KB = [
  { keys:["how long","last","lifespan","life span","years"], answer:`Asphalt typically lasts 20–30 years with proper maintenance:\n\n• Seal coat every 3–5 years\n• Fill cracks before winter\n• Avoid heavy vehicles on edges\n\nWant to book a free estimate? Just ask!` },
  { keys:["concrete last","how long concrete"], answer:`Concrete driveways last 30–50 years — longer than asphalt but costs more upfront. Proper thickness and base prep are everything.` },
  { keys:["asphalt vs concrete","concrete vs asphalt","which is better","difference between"], answer:`ASPHALT\n✓ Lower cost ($3–7/sq ft)\n✓ Easier repairs\n✓ Better in cold climates\n✗ Needs sealing every 3–5 yrs\n\nCONCRETE\n✓ Lasts longer (30–50 years)\n✓ Less maintenance\n✓ Great in hot climates\n✗ Higher upfront ($6–12/sq ft)\n\nFor most driveways, asphalt offers the best value. Want a free on-site consultation?` },
  { keys:["cost","price","how much","per square","sq ft","sqft","charge","pricing"], answer:`Typical price ranges:\n\nASPHALT\n• Driveway: $3–$7/sq ft\n• Parking lot: $2–$5/sq ft\n• Seal coat: $0.15–$0.25/sq ft\n• Crack fill: $1–$3/linear ft\n\nCONCRETE\n• Driveway: $6–$12/sq ft\n• Stamped/decorative: $12–$25/sq ft\n• Sidewalk: $5–$10/sq ft\n\nContact us for a free on-site estimate — prices vary by project size and conditions.` },
  { keys:["drive on","walk on","ready","cure","dry","when can"], answer:`NEW ASPHALT\n• Walk on: 24 hours\n• Drive (cars): 48–72 hours\n• Heavy vehicles: 2 weeks\n• Full cure: 6–12 months\n\nNEW CONCRETE\n• Walk on: 24–48 hours\n• Drive on: 7 days\n• Full strength: 28 days\n\n⚠️ Avoid sharp turns on new asphalt for the first few weeks.` },
  { keys:["seal","sealcoat","seal coat","sealing","how often seal"], answer:`Seal coat your asphalt every 3–5 years.\n\nFirst seal: Wait 6–12 months after new installation.\n\nWhy it matters:\n• Protects against UV, gas/oil, and water\n• Can double the life of your pavement\n• Makes it look brand new\n\nSigns you need it now:\n• Faded gray color (should be black)\n• Small surface cracks appearing\n• Rough, weathered texture\n\nWe offer seal coating — contact us for a free quote!` },
  { keys:["base","gravel","sub base","subbase","foundation","base layer"], answer:`The base layer is the most important part of any paving job.\n\nFor asphalt: 4–6" of compacted gravel base\nFor concrete: 4–6" compacted crushed stone\n\nWhy it matters:\nA bad base = cracking and sinking within 2–5 years.\nA good base = 20–30 years of solid performance.\n\nWe always inspect existing base before quoting.` },
  { keys:["crack","pothole","repair","fix","patch"], answer:`Fix cracks ASAP — small problems become big ones fast.\n\nCrack types & solutions:\n• Hairline cracks: Seal filler ($1–3/linear ft)\n• Alligator cracking: Section replacement needed\n• Edge cracking: Drainage issue to address\n• Potholes: Cut out and patch ($100–$400 each)\n\nRule of thumb: If cracks cover less than 25% of surface, repair and seal. More than that? Consider overlay or replacement.\n\nWe offer free assessments — no upselling.` },
  { keys:["parking lot","commercial","business"], answer:`Parking lots are our specialty!\n\nTypical costs:\n• New parking lot: $2–$5/sq ft (asphalt)\n• Restriping only: $0.15–$0.25/space\n• Seal coat + restripe: $0.40–$0.60/sq ft\n\nMaintenance schedule:\n• Seal coat: Every 3–4 years\n• Crack fill: Annually\n• Replacement: Every 20–25 years\n\nWe ensure all work meets ADA requirements. Contact us for a free commercial site assessment.` },
  { keys:["driveway","home","house","residential"], answer:`A new driveway is one of the best curb appeal investments!\n\nTypical 2-car driveway (400–600 sq ft):\n• Asphalt: $1,500–$4,000\n• Concrete: $3,000–$7,500\n• Timeline: 1–2 days for asphalt\n\nWhat's included:\n✓ Remove old pavement (if needed)\n✓ Grade and compact base\n✓ Install new surface\n✓ Clean up\n\nWe offer free estimates with no pressure.` },
  { keys:["stamped","decorative","colored","pattern","brick"], answer:`Stamped concrete gives you the high-end look of stone or brick at a fraction of the cost.\n\nPopular patterns:\n• Cobblestone / brick\n• Slate / flagstone\n• Wood plank\n• Custom geometric\n\nPricing: $12–$25/sq ft depending on complexity\n\nGreat for: patios, pool decks, walkways, and driveway borders.\n\nAsk us about our portfolio!` },
  { keys:["winter","cold","freeze","snow","ice","salt","deice"], answer:`Winter is tough on pavement. Here's how to protect it:\n\nFor asphalt:\n• Avoid harsh chemical deicers (they soften asphalt)\n• Sand is safer than salt\n• Fill cracks before winter — water freezes and expands\n• Raise plow blade slightly to avoid gouging\n\nFor concrete:\n• Never use rock salt (damages surface)\n• Use calcium chloride or sand instead\n\nBest time to pave: Spring through early fall (above 50°F).` },
  { keys:["free estimate","free quote","contact","call","schedule","appointment","book","estimate"], answer:`We'd love to help! Getting a free estimate is easy:\n\n📞 Call or text us — we respond within 1 hour\n📍 On-site visit — we come to you and measure the job\n💰 No obligation — our estimates are always free\n\nMost estimates are scheduled within 24–48 hours.\n\nWhat type of project are you looking to get quoted?` },
];

const SUGGESTIONS = [
  "How long does asphalt last?",
  "Asphalt vs concrete — which is better?",
  "How much does paving cost per sq ft?",
  "When can I drive on new asphalt?",
  "How often should I seal coat?",
  "How much does a new driveway cost?",
];

let messageCount = 0;

function getResponse(input) {
  const lower = input.toLowerCase();
  for (const e of KB) {
    if (e.keys.some(k => lower.includes(k))) return e.answer;
  }
  return `Great question! For the most accurate information about your specific project, a quick free on-site assessment is the best next step.\n\nFeel free to ask about:\n• Pricing and cost estimates\n• Asphalt vs concrete comparison\n• Repairs and maintenance\n• Timelines and curing\n• Seal coating schedules\n\nOr ask about booking a free estimate — we'd love to help!`;
}

function addMessage(role, content) {
  const chat = document.getElementById("chat");
  const row = document.createElement("div");
  row.className = `msg-row${role === "user" ? " user" : ""}`;

  if (role === "assistant") {
    const av = document.createElement("div");
    av.className = "avatar";
    av.textContent = "⬡";
    row.appendChild(av);
  }

  const bubble = document.createElement("div");
  bubble.className = `bubble ${role}`;
  bubble.textContent = content;
  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}

function addTyping() {
  const chat = document.getElementById("chat");
  const row = document.createElement("div");
  row.className = "msg-row";
  row.id = "typing";
  const av = document.createElement("div");
  av.className = "avatar";
  av.textContent = "⬡";
  const bubble = document.createElement("div");
  bubble.className = "bubble ai dots";
  bubble.innerHTML = "<span></span><span></span><span></span>";
  row.appendChild(av);
  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typing");
  if (el) el.remove();
}

function showSuggestions() {
  const chat = document.getElementById("chat");
  const wrap = document.createElement("div");
  wrap.className = "suggestions";
  wrap.id = "suggestions";
  const label = document.createElement("div");
  label.className = "suggest-label";
  label.textContent = "COMMON QUESTIONS";
  wrap.appendChild(label);
  const grid = document.createElement("div");
  grid.className = "suggest-grid";
  SUGGESTIONS.forEach(q => {
    const btn = document.createElement("button");
    btn.className = "suggest-btn";
    btn.textContent = q;
    btn.onclick = () => {
      document.getElementById("suggestions")?.remove();
      sendMessage(q);
    };
    grid.appendChild(btn);
  });
  wrap.appendChild(grid);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function sendMessage(text) {
  const input = document.getElementById("input");
  const msg = text || input.value.trim();
  if (!msg) return;

  document.getElementById("suggestions")?.remove();
  input.value = "";
  input.style.height = "auto";
  document.getElementById("sendBtn").disabled = true;
  messageCount++;

  addMessage("user", msg);
  addTyping();

  setTimeout(() => {
    removeTyping();
    const reply = getResponse(msg);
    addMessage("assistant", reply);
  }, 700 + Math.random() * 600);
}

// Init
window.onload = () => {
  addMessage("assistant", "Hey! I'm your AI paving assistant. Ask me anything about asphalt, concrete, driveways, parking lots, repairs, or pricing. I'm here to help 24/7.");
  showSuggestions();

  const input = document.getElementById("input");
  const btn = document.getElementById("sendBtn");

  input.addEventListener("input", () => {
    btn.disabled = !input.value.trim();
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 100) + "px";
  });

  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      if (input.value.trim()) sendMessage();
    }
  });
};
</script>
</body>
</html>
